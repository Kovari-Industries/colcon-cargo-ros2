---
name: CI

on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install nightly toolchain (for rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/Cargo.lock') }}

      - name: Check formatting
        working-directory: packages
        run: cargo +nightly fmt --all -- --check

      - name: Run clippy
        working-directory: packages
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        working-directory: packages
        run: cargo +stable test --workspace

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build and install wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          sccache: 'true'
          working-directory: packages/colcon-cargo-ros2

      - name: Install wheel and test dependencies
        run: |
          pip install packages/colcon-cargo-ros2/dist/*.whl
          pip install pytest ruff colcon-core colcon-library-path colcon-ros

      - name: Run ruff lint
        working-directory: packages/colcon-cargo-ros2
        run: ruff check colcon_cargo_ros2/ test/

      - name: Run pytest
        run: pytest packages/colcon-cargo-ros2/test/ -v
